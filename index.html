<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>成人肥胖食养指南 · 每日食谱</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700&family=Noto+Sans+SC:wght@300;400;500&display=swap');

:root {
  --bg: #faf7f2;
  --surface: #ffffff;
  --ink: #2c2416;
  --muted: #8c7b65;
  --accent: #c8622a;
  --accent-light: #f5e8de;
  --green: #4a7c59;
  --green-light: #e4ede7;
  --gold: #c4982a;
  --gold-light: #f5edda;
  --border: #e8e0d4;
  --shadow: 0 4px 24px rgba(44,36,22,0.08);
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background: var(--bg);
  color: var(--ink);
  font-family: 'Noto Sans SC', sans-serif;
  min-height: 100vh;
  overflow-x: hidden;
}

/* Decorative background */
body::before {
  content: '';
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background:
    radial-gradient(ellipse at 20% 10%, rgba(200,98,42,0.06) 0%, transparent 50%),
    radial-gradient(ellipse at 80% 90%, rgba(74,124,89,0.06) 0%, transparent 50%),
    radial-gradient(ellipse at 60% 40%, rgba(196,152,42,0.04) 0%, transparent 40%);
  pointer-events: none;
  z-index: 0;
}

.app {
  position: relative;
  z-index: 1;
  max-width: 480px;
  margin: 0 auto;
  padding: 0 0 80px;
}

/* Header */
.header {
  padding: 40px 24px 24px;
  text-align: center;
}

.header-badge {
  display: inline-block;
  background: var(--accent-light);
  color: var(--accent);
  font-size: 11px;
  font-weight: 500;
  letter-spacing: 0.15em;
  padding: 4px 14px;
  border-radius: 20px;
  margin-bottom: 16px;
}

.header h1 {
  font-family: 'Noto Serif SC', serif;
  font-size: 26px;
  font-weight: 700;
  color: var(--ink);
  line-height: 1.4;
  margin-bottom: 8px;
}

.header p {
  font-size: 13px;
  color: var(--muted);
  line-height: 1.6;
}

/* Filter Section */
.filter-section {
  padding: 0 20px 20px;
}

.filter-row {
  display: flex;
  gap: 10px;
  margin-bottom: 10px;
}

.filter-group {
  flex: 1;
}

.filter-label {
  font-size: 11px;
  color: var(--muted);
  letter-spacing: 0.05em;
  margin-bottom: 6px;
  display: block;
}

.chip-group {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
}

.chip {
  font-size: 12px;
  padding: 5px 12px;
  border-radius: 20px;
  border: 1.5px solid var(--border);
  background: var(--surface);
  color: var(--muted);
  cursor: pointer;
  transition: all 0.2s;
  font-family: 'Noto Sans SC', sans-serif;
}

.chip:active { transform: scale(0.95); }

.chip.active-region {
  border-color: var(--accent);
  background: var(--accent-light);
  color: var(--accent);
  font-weight: 500;
}

.chip.active-season {
  border-color: var(--green);
  background: var(--green-light);
  color: var(--green);
  font-weight: 500;
}

.chip.active-calorie {
  border-color: var(--gold);
  background: var(--gold-light);
  color: var(--gold);
  font-weight: 500;
}

/* Random Button */
.random-btn-wrap {
  padding: 0 20px 24px;
}

.random-btn {
  width: 100%;
  padding: 18px;
  border-radius: 16px;
  border: none;
  background: linear-gradient(135deg, var(--accent) 0%, #a84e22 100%);
  color: white;
  font-size: 16px;
  font-family: 'Noto Serif SC', serif;
  font-weight: 600;
  cursor: pointer;
  box-shadow: 0 6px 24px rgba(200,98,42,0.35);
  transition: all 0.2s;
  position: relative;
  overflow: hidden;
  letter-spacing: 0.05em;
}

.random-btn::before {
  content: '';
  position: absolute;
  top: 0; left: -100%;
  width: 100%; height: 100%;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,0.15), transparent);
  transition: left 0.4s;
}

.random-btn:hover::before { left: 100%; }
.random-btn:active { transform: scale(0.98); box-shadow: 0 2px 12px rgba(200,98,42,0.3); }

.random-btn .btn-icon { font-size: 20px; margin-right: 8px; vertical-align: middle; }

/* Result counter */
.result-hint {
  text-align: center;
  font-size: 12px;
  color: var(--muted);
  margin-top: -16px;
  margin-bottom: 20px;
}

/* Recipe Card */
.recipe-card {
  margin: 0 20px;
  background: var(--surface);
  border-radius: 24px;
  box-shadow: var(--shadow);
  overflow: hidden;
  animation: slideUp 0.4s cubic-bezier(0.34,1.56,0.64,1);
}

@keyframes slideUp {
  from { opacity: 0; transform: translateY(30px) scale(0.97); }
  to { opacity: 1; transform: translateY(0) scale(1); }
}

.card-header {
  padding: 24px 24px 18px;
  border-bottom: 1px solid var(--border);
  position: relative;
}

.card-tags {
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
  margin-bottom: 12px;
}

.tag {
  font-size: 11px;
  padding: 3px 10px;
  border-radius: 12px;
  font-weight: 500;
  letter-spacing: 0.04em;
}

.tag-region { background: var(--accent-light); color: var(--accent); }
.tag-season { background: var(--green-light); color: var(--green); }
.tag-calorie { background: var(--gold-light); color: var(--gold); }

.card-title {
  font-family: 'Noto Serif SC', serif;
  font-size: 20px;
  font-weight: 700;
  color: var(--ink);
  margin-bottom: 8px;
}

.card-num {
  font-size: 12px;
  color: var(--muted);
}

/* Nutrition strip */
.nutrition-strip {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 1px;
  background: var(--border);
  border-bottom: 1px solid var(--border);
}

.nutrition-item {
  background: var(--surface);
  padding: 12px 8px;
  text-align: center;
}

.nutrition-val {
  font-size: 15px;
  font-weight: 600;
  color: var(--ink);
  font-family: 'Noto Serif SC', serif;
}

.nutrition-label {
  font-size: 10px;
  color: var(--muted);
  margin-top: 2px;
}

/* Meal Sections */
.meals-container {
  padding: 20px 20px 8px;
}

.meal-block {
  margin-bottom: 18px;
}

.meal-title {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 8px;
}

.meal-dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  flex-shrink: 0;
}

.meal-dot-breakfast { background: var(--gold); }
.meal-dot-snack { background: #9b7cb6; }
.meal-dot-lunch { background: var(--green); }
.meal-dot-dinner { background: var(--accent); }

.meal-name {
  font-size: 13px;
  font-weight: 600;
  color: var(--ink);
  letter-spacing: 0.05em;
}

.meal-items {
  padding-left: 16px;
  border-left: 2px solid var(--border);
}

.meal-item {
  font-size: 13px;
  color: #5a4e3d;
  line-height: 1.8;
  padding: 2px 0;
}

/* Seasoning */
.seasoning {
  padding: 12px 20px 16px;
  background: var(--bg);
  border-top: 1px solid var(--border);
  font-size: 12px;
  color: var(--muted);
}

/* Macro bars */
.macro-section {
  padding: 16px 20px 20px;
  border-top: 1px solid var(--border);
}

.macro-title {
  font-size: 12px;
  color: var(--muted);
  margin-bottom: 10px;
  letter-spacing: 0.05em;
}

.macro-bar-wrap {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 6px;
}

.macro-bar-label {
  font-size: 12px;
  color: var(--ink);
  width: 50px;
  flex-shrink: 0;
}

.macro-bar-track {
  flex: 1;
  height: 6px;
  background: var(--border);
  border-radius: 3px;
  overflow: hidden;
}

.macro-bar-fill {
  height: 100%;
  border-radius: 3px;
  transition: width 0.6s cubic-bezier(0.34,1.56,0.64,1);
}

.macro-bar-pct {
  font-size: 11px;
  color: var(--muted);
  width: 30px;
  text-align: right;
}

.bar-protein { background: var(--accent); }
.bar-carb { background: var(--gold); }
.bar-fat { background: var(--green); }

/* Empty state */
.empty-state {
  text-align: center;
  padding: 60px 20px;
  margin: 0 20px;
  background: var(--surface);
  border-radius: 24px;
  box-shadow: var(--shadow);
}

.empty-icon { font-size: 48px; margin-bottom: 16px; }
.empty-title { font-family: 'Noto Serif SC', serif; font-size: 18px; font-weight: 600; margin-bottom: 8px; }
.empty-text { font-size: 13px; color: var(--muted); line-height: 1.6; }

/* History */
.history-section {
  padding: 24px 20px 0;
}

.history-title {
  font-size: 12px;
  color: var(--muted);
  letter-spacing: 0.08em;
  margin-bottom: 12px;
}

.history-list {
  display: flex;
  flex-direction: column;
  gap: 8px;
}

.history-item {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 10px 14px;
  background: var(--surface);
  border-radius: 12px;
  border: 1px solid var(--border);
  cursor: pointer;
  transition: all 0.2s;
  opacity: 0;
  animation: fadeIn 0.3s forwards;
}

@keyframes fadeIn {
  to { opacity: 1; }
}

.history-item:hover {
  border-color: var(--accent);
  background: var(--accent-light);
}

.history-item-left {
  display: flex;
  align-items: center;
  gap: 8px;
}

.history-item-num {
  width: 22px; height: 22px;
  background: var(--bg);
  border-radius: 50%;
  font-size: 10px;
  color: var(--muted);
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: 600;
}

.history-item-name {
  font-size: 13px;
  color: var(--ink);
}

.history-item-meta {
  font-size: 11px;
  color: var(--muted);
}

/* Divider ornament */
.ornament {
  text-align: center;
  color: var(--border);
  font-size: 18px;
  padding: 8px 0;
  letter-spacing: 8px;
}
</style>
</head>

const REGIONS = ["东北","西北","华北","华东","华中","西南","华南"];
const SEASONS = ["春","夏","秋","冬"];
const CALORIES = [1200,1400,1600];

let selectedRegions = [];
let selectedSeasons = [];
let selectedCalories = [];
let history = [];

function init() {
  // Region chips
  const rc = document.getElementById('regionChips');
  REGIONS.forEach(r => {
    const c = document.createElement('button');
    c.className = 'chip'; c.textContent = r + '地区';
    c.onclick = () => toggle('region', r, c);
    rc.appendChild(c);
  });
  // Season chips
  const sc = document.getElementById('seasonChips');
  const sEmoji = {春:'🌱',夏:'☀️',秋:'🍂',冬:'❄️'};
  SEASONS.forEach(s => {
    const c = document.createElement('button');
    c.className = 'chip'; c.textContent = sEmoji[s]+s+'季';
    c.onclick = () => toggle('season', s, c);
    sc.appendChild(c);
  });
  // Calorie chips
  const cc = document.getElementById('calorieChips');
  CALORIES.forEach(cal => {
    const c = document.createElement('button');
    c.className = 'chip'; c.textContent = cal+'kcal';
    c.onclick = () => toggle('calorie', cal, c);
    cc.appendChild(c);
  });
  updateHint();
}

function toggle(type, val, el) {
  if(type==='region') {
    const idx = selectedRegions.indexOf(val);
    if(idx>=0) { selectedRegions.splice(idx,1); el.className='chip'; }
    else { selectedRegions.push(val); el.className='chip active-region'; }
  } else if(type==='season') {
    const idx = selectedSeasons.indexOf(val);
    if(idx>=0) { selectedSeasons.splice(idx,1); el.className='chip'; }
    else { selectedSeasons.push(val); el.className='chip active-season'; }
  } else {
    const idx = selectedCalories.indexOf(val);
    if(idx>=0) { selectedCalories.splice(idx,1); el.className='chip'; }
    else { selectedCalories.push(val); el.className='chip active-calorie'; }
  }
  updateHint();
}

function getFiltered() {
  return RECIPES.filter(r => {
    if(selectedRegions.length && !selectedRegions.includes(r.region)) return false;
    if(selectedSeasons.length && !selectedSeasons.includes(r.season)) return false;
    if(selectedCalories.length && !selectedCalories.includes(r.calorie)) return false;
    return true;
  });
}

function updateHint() {
  const n = getFiltered().length;
  const hint = document.getElementById('resultHint');
  hint.textContent = n < 84 ? `已筛选 ${n} 套食谱` : `共 ${n} 套食谱可推荐`;
}

const mealLabels = {
  breakfast:{label:'早餐',dot:'breakfast'},
  snack1:{label:'加餐',dot:'snack'},
  lunch:{label:'午餐',dot:'lunch'},
  snack2:{label:'加餐',dot:'snack'},
  dinner:{label:'晚餐',dot:'dinner'}
};

const seasonMap = {春:'🌱',夏:'☀️',秋:'🍂',冬:'❄️'};

function randomRecipe() {
  const pool = getFiltered();
  if(!pool.length) {
    document.getElementById('recipeDisplay').innerHTML = `
      <div class="empty-state">
        <div class="empty-icon">🥡</div>
        <div class="empty-title">暂无符合条件的食谱</div>
        <div class="empty-text">请调整筛选条件后重试</div>
      </div>`;
    return;
  }
  const r = pool[Math.floor(Math.random()*pool.length)];
  renderRecipe(r);
  addHistory(r);
}

function renderRecipe(r) {
  let mealsHtml = '';
  const order = ['breakfast','snack1','lunch','snack2','dinner'];
  order.forEach(key => {
    if(!r.meals[key] || !r.meals[key].length) return;
    const m = mealLabels[key];
    mealsHtml += `
      <div class="meal-block">
        <div class="meal-title">
          <div class="meal-dot meal-dot-${m.dot}"></div>
          <span class="meal-name">${m.label}</span>
        </div>
        <div class="meal-items">
          ${r.meals[key].map(item => `<div class="meal-item">· ${item}</div>`).join('')}
        </div>
      </div>`;
  });

  const n = r.nutrition;
  const total = n.protein*4 + n.carb*4 + n.fat*9;

  document.getElementById('recipeDisplay').innerHTML = `
    <div class="recipe-card">
      <div class="card-header">
        <div class="card-tags">
          <span class="tag tag-region">${r.region}地区</span>
          <span class="tag tag-season">${seasonMap[r.season]}${r.season}季</span>
          <span class="tag tag-calorie">🔥 ${r.calorie}kcal</span>
        </div>
        <div class="card-title">今日推荐食谱</div>
        <div class="card-num">食谱 No.${r.id} · ${r.name}</div>
      </div>
      <div class="nutrition-strip">
        <div class="nutrition-item">
          <div class="nutrition-val">${r.calorie}</div>
          <div class="nutrition-label">总热量 kcal</div>
        </div>
        <div class="nutrition-item">
          <div class="nutrition-val">${n.protein}g</div>
          <div class="nutrition-label">蛋白质</div>
        </div>
        <div class="nutrition-item">
          <div class="nutrition-val">${n.carb}g</div>
          <div class="nutrition-label">碳水化合物</div>
        </div>
        <div class="nutrition-item">
          <div class="nutrition-val">${n.fat}g</div>
          <div class="nutrition-label">脂肪</div>
        </div>
      </div>
      <div class="meals-container">${mealsHtml}</div>
      <div class="seasoning">🫙 全天调料：${r.seasoning}</div>
      <div class="macro-section">
        <div class="macro-title">宏量营养素比例</div>
        <div class="macro-bar-wrap">
          <span class="macro-bar-label">蛋白质</span>
          <div class="macro-bar-track"><div class="macro-bar-fill bar-protein" style="width:${n.proteinPct}%"></div></div>
          <span class="macro-bar-pct">${n.proteinPct}%</span>
        </div>
        <div class="macro-bar-wrap">
          <span class="macro-bar-label">碳水化合物</span>
          <div class="macro-bar-track"><div class="macro-bar-fill bar-carb" style="width:${n.carbPct}%"></div></div>
          <span class="macro-bar-pct">${n.carbPct}%</span>
        </div>
        <div class="macro-bar-wrap">
          <span class="macro-bar-label">脂肪</span>
          <div class="macro-bar-track"><div class="macro-bar-fill bar-fat" style="width:${n.fatPct}%"></div></div>
          <span class="macro-bar-pct">${n.fatPct}%</span>
        </div>
      </div>
    </div>`;
}

function addHistory(r) {
  history = history.filter(h => h.id !== r.id);
  history.unshift(r);
  if(history.length > 5) history.pop();
  renderHistory();
}

function renderHistory() {
  if(!history.length) return;
  const sec = document.getElementById('historySection');
  const list = document.getElementById('historyList');
  sec.style.display = 'block';
  list.innerHTML = history.slice(1).map((r, i) => `
    <div class="history-item" onclick="showHistory(${r.id})" style="animation-delay:${i*0.06}s">
      <div class="history-item-left">
        <div class="history-item-num">${i+1}</div>
        <span class="history-item-name">${r.region} ${seasonMap[r.season]}${r.season}·${r.calorie}kcal</span>
      </div>
      <span class="history-item-meta">No.${r.id}</span>
    </div>`).join('');
}

function showHistory(id) {
  const r = RECIPES.find(x => x.id === id);
  if(r) { renderRecipe(r); window.scrollTo({top:0,behavior:'smooth'}); }
}

init();
</script>
